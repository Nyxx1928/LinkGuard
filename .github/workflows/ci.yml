name: ci

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  changes:
    name: detect dependency changes
    runs-on: ubuntu-latest
    outputs:
      deps_changed: ${{ steps.final.outputs.deps_changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect dependency file changes (PRs only)
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            deps:
              - 'backend/composer.lock'
              - 'backend/package-lock.json'
              - 'frontend/package-lock.json'

      - name: Set dependency change output
        id: final
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "deps_changed=${{ steps.filter.outputs.deps }}" >> $GITHUB_OUTPUT
          else
            echo "deps_changed=true" >> $GITHUB_OUTPUT
          fi

  phase1-lint-validate:
    name: phase 1 - lint and validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend PHP dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate composer.json
        working-directory: backend
        run: composer validate --no-check-publish --strict

      - name: Lint backend (Pint)
        working-directory: backend
        run: php vendor/bin/pint --test

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check for hardcoded secrets
        shell: bash
        run: |
          if grep -r -E "(PASSWORD|SECRET|API_KEY|TOKEN|CREDENTIAL)\s*=\s*['\"][a-zA-Z0-9+/=]{16,}" \
            --include="*.php" --include="*.ts" --include="*.js" --include="*.tsx" --include="*.jsx" \
            --exclude-dir={node_modules,.git,vendor,dist,build} \
            --exclude="*.md" --exclude="*example*" \
            backend/ frontend/ 2>/dev/null; then
            echo "Hardcoded secrets found"
            exit 1
          fi

      - name: Check for unsafe input handling
        shell: bash
        run: |
          if grep -r -E "\beval\(" --include="*.php" --include="*.ts" --include="*.js" \
            --exclude-dir={node_modules,vendor,.git,dist,build} backend/ frontend/ 2>/dev/null; then
            echo "eval() usage detected"
            exit 1
          fi
          echo "No unsafe patterns detected"

  phase2-unit-tests:
    name: phase 2 - unit testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [phase1-lint-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment
        run: |
          cp backend/.env.example backend/.env
          {
            echo "APP_ENV=testing"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=:memory:"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
          } >> backend/.env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate --no-interaction

      - name: Run backend unit tests
        working-directory: backend
        run: php artisan test --testsuite=Unit

  phase3-integration-tests:
    name: phase 3 - integration testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [phase1-lint-validate]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: geotracker_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, xml, ctype, json, openssl, pdo_mysql
          tools: composer:v2
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment
        run: |
          cp backend/.env.example backend/.env
          {
            echo "APP_ENV=testing"
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=geotracker_test"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
            echo "CACHE_STORE=array"
            echo "SESSION_DRIVER=array"
            echo "QUEUE_CONNECTION=sync"
          } >> backend/.env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate --no-interaction

      - name: Run database migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run backend integration tests
        working-directory: backend
        run: php artisan test --testsuite=Feature

  phase4-build:
    name: phase 4 - build assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [phase1-lint-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend Node dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build backend assets (Vite)
        working-directory: backend
        run: npm run build

      - name: Build frontend (react-scripts)
        working-directory: frontend
        run: npm run build

  phase5-security-scan:
    name: phase 5 - security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [phase4-build, changes]
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (dependencies)
        uses: anchore/sbom-action@v0.24.0
        with:
          path: ./
          format: spdx-json
          output-file: sbom-dependencies.spdx.json

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln

      - name: Install Cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign SBOM (keyless, push only)
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob --yes --output-signature sbom.sig --output-certificate sbom.pem sbom-dependencies.spdx.json
          cosign verify-blob \
            --certificate sbom.pem \
            --signature sbom.sig \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            sbom-dependencies.spdx.json

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            sbom-dependencies.spdx.json
            sbom.sig
            sbom.pem
          if-no-files-found: ignore

  phase6-ci-summary:
    name: phase 6 - ci summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - phase1-lint-validate
      - phase2-unit-tests
      - phase3-integration-tests
      - phase4-build
      - phase5-security-scan
    steps:
      - name: Generate summary
        env:
          PHASE1: ${{ needs.phase1-lint-validate.result }}
          PHASE2: ${{ needs.phase2-unit-tests.result }}
          PHASE3: ${{ needs.phase3-integration-tests.result }}
          PHASE4: ${{ needs.phase4-build.result }}
          PHASE5: ${{ needs.phase5-security-scan.result }}
        run: |
          {
            echo "## CI Summary"
            echo ""
            echo "| Phase | Result |"
            echo "|---|---|"
            echo "| Phase 1 - Lint & Validate | ${PHASE1} |"
            echo "| Phase 2 - Unit Tests | ${PHASE2} |"
            echo "| Phase 3 - Integration Tests | ${PHASE3} |"
            echo "| Phase 4 - Build Assets | ${PHASE4} |"
            echo "| Phase 5 - Security Scan | ${PHASE5} |"
          } >> "$GITHUB_STEP_SUMMARY"

          for status in "$PHASE1" "$PHASE2" "$PHASE3" "$PHASE4" "$PHASE5"; do
            if [ "$status" != "success" ]; then
              echo "One or more phases failed."
              exit 1
            fi
          done
