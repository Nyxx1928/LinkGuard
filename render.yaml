services:
  - type: web
    name: geotracker-api
    env: docker
    repo: https://github.com/YOUR_ORG/YOUR_REPO
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://geotracker-api.onrender.com
      - key: APP_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://geo-tracker-eight-blond.vercel.app
      - key: FRONTEND_ORIGINS
        value: https://geo-tracker-eight-blond.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: geo-tracker-eight-blond.vercel.app
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: none
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: gateway01.ap-southeast-1.prod.aws.tidbcloud.com
      - key: DB_PORT
        value: "4000"
      - key: DB_DATABASE
        value: sys
      - key: DB_USERNAME
        value: 2KeXfhYXuehz95s.root
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
